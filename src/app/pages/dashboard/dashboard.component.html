<app-topbar></app-topbar>

<div class="dashboard-layout">
  <app-sidebar></app-sidebar>
  <div class="dashboard-content">

    <div class="metrics-grid">
      <div class="metric-card">
        <h3>Total Revenue</h3>
        <p class="metric-value">$45,230</p>
        <p class="metric-change positive">+12% from last month</p>
      </div>

      <div class="metric-card">
        <h3>Active Users</h3>
        <p class="metric-value">1,234</p>
        <p class="metric-change positive">+8% from last month</p>
      </div>

      <div class="metric-card">
        <h3>Total Orders</h3>
        <p class="metric-value">89</p>
        <p class="metric-change negative">-3% from last month</p>
      </div>

      <div class="metric-card">
        <h3>New Customers</h3>
        <p class="metric-value">123</p>
        <p class="metric-change positive">+15% from last month</p>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-row">
        <div class="chart-item">
          <h3>Sales Trend</h3>
          <div class="chart-container">
            <canvas #chartCanvas></canvas>
          </div>
        </div>
        <div class="chart-item">
          <h3>Revenue Distribution</h3>
          <div class="chart-container pie-chart-container">
            <canvas #pieChartCanvas></canvas>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
